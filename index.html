<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>MovieVerse</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Navbar -->
    <header>
        <div class="nav">
            <h1>🎬 MovieVerse</h1>
            <div>
                <button id="view-fav">⭐ Favorites</button>
                <button id="theme-toggle">🌙</button>
            </div>
        </div>
    </header>

    <!-- Controls -->
    <div class="controls">
        <input type="text" id="search" placeholder="🔍 Search movies..." />

        <select id="filter">
            <option value="">Filter</option>
            <option value="old">Before 2010</option>
            <option value="new">After 2010</option>
        </select>

        <select id="sort">
            <option value="">Sort</option>
            <option value="year-asc">Year Asc</option>
            <option value="year-desc">Year Desc</option>
        </select>
    </div>

    <!-- Back Button -->
    <button id="back-home" style="display:none;">⬅ Back</button>

    <!-- Movies -->
    <div id="movie-container"></div>

    <script src="script.js"></script>
</body>

</html>
